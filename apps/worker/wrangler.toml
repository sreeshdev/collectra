name = "dish-hobby-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Cron triggers:
# - 1st: monthly billing + payment link resend
# - 6,11,16,21,26: payment link resend (every 5 days)
[triggers]
crons = ["0 8 1,6,11,16,21,26 * *"]

[observability]
[observability.logs]
enabled = true
invocation_logs = true

# Hyperdrive: connection pooling to prevent Neon/DB hangs in Workers.
# Create with: npx wrangler hyperdrive create dish-hobby-db --connection-string="postgres://USER:PASSWORD@HOST/database?sslmode=require"
# Use Neon's direct (non-pooled) connection string - uncheck "Pooled" in Neon dashboard.
#
# Local dev: run via `yarn dev` (uses load-env.sh) which sets WRANGLER_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE
# from DATABASE_URL in .dev.vars. Or add to .dev.vars:
#   WRANGLER_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE="postgresql://..."
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "a10fdd49d1e34291a14352b5910bf3c4"

# Environment variables should be set via:
# 1. Cloudflare Dashboard → Workers → Settings → Variables
# 2. Or using: wrangler secret put VARIABLE_NAME
#
# Required variables:
# - DATABASE_URL
# - JWT_SECRET
# - RAZORPAY_KEY_ID
# - RAZORPAY_KEY_SECRET
# - RAZORPAY_WEBHOOK_SECRET
# - WHATSAPP_TOKEN
# - WHATSAPP_PHONE_NUMBER_ID
# - WHATSAPP_TEMPLATE_NAME
# - APP_BASE_URL

